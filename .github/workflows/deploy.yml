name: Deploy to DigiCloud VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_BRANCH
          script: |
            set -e
            cd /opt/adam-careers

            # Pull the requested branch
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"

            # Write production env from secrets
            umask 077
            cat > .env.production << EOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=https://adamcareers.com
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_MODEL=x-ai/grok-3-mini
            COMPOSIO_API_KEY=${{ secrets.COMPOSIO_API_KEY }}
            EOF
            chmod 600 .env.production

            # Build & restart (let Docker reuse cache when possible)
            docker compose build
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Deployed $DEPLOY_BRANCH"
